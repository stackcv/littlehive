name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src
      - name: Build
        run: python -m build
      - name: Run lhive CLI smoke
        run: |
          # The command should be installed and print usage
          OUTPUT=$(lhive 2>&1 || true)
          echo "$OUTPUT"
          if [[ "$OUTPUT" != *"Usage: lhive"* ]]; then
            echo "lhive command not found or did not output usage"
            exit 1
          fi
